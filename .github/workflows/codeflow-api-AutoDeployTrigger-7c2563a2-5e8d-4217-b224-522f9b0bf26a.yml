name: Trigger auto deployment for codeflow-api

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ deibi ]
    paths:
    - '**'
    - '.github/workflows/codeflow-api-AutoDeployTrigger-7c2563a2-5e8d-4217-b224-522f9b0bf26a.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.CODEFLOWAPI_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.CODEFLOWAPI_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.CODEFLOWAPI_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}/projectflow-backend
          dockerfilePath: dockerfile
          registryUrl: codeflowrest.azurecr.io
          registryUsername: ${{ secrets.CODEFLOWAPI_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.CODEFLOWAPI_REGISTRY_PASSWORD }}
          containerAppName: codeflow-api
          resourceGroup: Proyecto_Ingenieria
          imageToBuild: codeflowrest.azurecr.io/codeflow-api:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


